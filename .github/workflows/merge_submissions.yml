name: Merge Community Submissions

on:
  workflow_dispatch:
  push:
    branches:
      - living-library
    paths:
      - 'submissions/**'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout living-library
        uses: actions/checkout@v4
        with:
          ref: living-library

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Merge submissions into master files
        run: python .github/scripts/merge_submissions.py

      - name: Commit updated master files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add master/
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: merge community submissions [skip ci]"
          git push
